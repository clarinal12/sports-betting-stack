name: sports-betting-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sports
      POSTGRES_PASSWORD: sports
      POSTGRES_DB: sports_betting
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sports -d sports_betting']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./sports-betting-service
      target: dev-runner
    ports:
      - '5003:5003'
    env_file:
      - .env.deploy
    environment:
      PORT: 5003
      DATABASE_URL: postgresql://sports:sports@postgres:5432/sports_betting
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:5003/ready']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  backoffice:
    build:
      context: ./sports-betting-backoffice
      args:
        NEXT_PUBLIC_API_BASE: ${API_PUBLIC_URL:-http://localhost:5003}/api/v1
    ports:
      - '5001:5001'
    depends_on:
      api:
        condition: service_healthy

  player-shell:
    build:
      context: ./sportsbook-player-shell
      args:
        NEXT_PUBLIC_API_BASE: ${API_PUBLIC_URL:-http://localhost:5003}/api/v1
        NEXT_PUBLIC_WS_URL: ${API_PUBLIC_URL:-http://localhost:5003}
    ports:
      - '5002:5002'
    depends_on:
      api:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    profiles: [https]
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-}
      API_DOMAIN: ${API_DOMAIN}
      BACKOFFICE_DOMAIN: ${BACKOFFICE_DOMAIN}
      PLAYER_DOMAIN: ${PLAYER_DOMAIN}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy
      backoffice:
        condition: service_started
      player-shell:
        condition: service_started

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
